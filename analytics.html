<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Analytics — Hausarztpraxis Stärke &amp; Staack</title>
  <link rel="icon" type="image/png" href="images/logo-icon-gruen.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { background: var(--ink); color: rgba(255,255,255,0.85); min-height: 100vh; }
    body::before { display: none; }
    .admin-shell { max-width: 64rem; margin: 0 auto; padding: 2rem var(--gutter) 5rem; }
    .admin-top {
      display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
      padding: 1.25rem 0 1.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.14);
      margin-bottom: 2rem;
    }
    .admin-top h1 { font-size: 1.5rem; color: #fff; display: flex; align-items: center; gap: 0.85rem; }
    .live-dot {
      display: inline-flex; align-items: center; gap: 0.45rem;
      font-family: var(--sans); font-size: 0.7rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
      color: #4caf7d;
    }
    .live-dot::before {
      content: ''; width: 0.5rem; height: 0.5rem; border-radius: 50%;
      background: #4caf7d; animation: livePulse 1.8s infinite;
    }
    @keyframes livePulse { 50% { opacity: 0.3; } }
    .refresh-info { font-size: var(--text-xs); color: rgba(255,255,255,0.45); }
    .refresh-info a { color: var(--bronze); }
    .panel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-lg);
      padding: 1.75rem 2rem;
      margin-bottom: 1.75rem;
    }
    .panel h2 { color: #fff; font-size: 1.3rem; margin-bottom: 1.25rem; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(10rem, 1fr)); gap: 1.25rem; margin-bottom: 1.75rem; }
    .stat-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
    }
    .stat-card .label { font-size: var(--text-xs); letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
    .stat-card .value { font-family: var(--serif); font-size: 2.6rem; line-height: 1.1; color: #fff; margin-top: 0.5rem; }
    .stat-card.gold { border-color: rgba(184,132,58,0.5); }
    .stat-card.gold .value { color: var(--bronze); }
    .bar-row { display: grid; grid-template-columns: 9rem 1fr 3rem; gap: 1rem; align-items: center; padding: 0.55rem 0; }
    .bar-page { font-size: var(--text-sm); color: rgba(255,255,255,0.75); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { height: 0.55rem; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--ink-mid), var(--bronze)); border-radius: 99px; }
    .bar-count { font-size: var(--text-sm); text-align: right; color: rgba(255,255,255,0.6); }
    table.visits { width: 100%; border-collapse: collapse; font-size: var(--text-sm); }
    table.visits th { text-align: left; font-size: var(--text-xs); letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.45); padding: 0.6rem 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.15); }
    table.visits td { padding: 0.65rem 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.07); color: rgba(255,255,255,0.75); }
    .login-wrap { max-width: 24rem; margin: 14vh auto 0; text-align: center; padding-inline: var(--gutter); }
    .login-wrap img { width: 3.5rem; margin: 0 auto 1.5rem; }
    .panel .field label { color: rgba(255,255,255,0.7); }
    .panel .field input {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.2);
      color: #fff;
    }
    .panel .field input:focus { border-color: var(--bronze); box-shadow: 0 0 0 3px rgba(184,132,58,0.25); }
    .msg { display: none; margin-top: 1rem; padding: 0.85rem 1.1rem; border-radius: var(--radius); font-size: var(--text-sm); }
    .msg.err { background: rgba(168,53,43,0.3); border-left: 2px solid #e07a6f; }
    .msg.is-visible { display: block; }
    .logout-btn { background: none; border: 1px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.7); padding: 0.5rem 1rem; border-radius: var(--radius); font-size: var(--text-sm); }
    .logout-btn:hover { border-color: var(--bronze); color: #fff; }
    .state { color: rgba(255,255,255,0.5); font-size: var(--text-sm); padding: 1rem 0; }
  </style>
</head>
<body>
  <div class="login-wrap" id="login-view">
    <img src="images/logo-icon-transparent.png" alt="" style="filter:brightness(0) invert(1)">
    <h1 style="color:#fff;font-size:1.75rem;margin-bottom:0.5rem">Analytics</h1>
    <p style="color:rgba(255,255,255,0.6);font-size:var(--text-sm);margin-bottom:2rem">Bitte melden Sie sich mit Ihrem Admin-Schlüssel an.</p>
    <form id="login-form">
      <div class="panel" style="text-align:left">
        <div class="field">
          <label for="admin-key">Admin-Schlüssel</label>
          <input type="password" id="admin-key" autocomplete="current-password" required>
        </div>
        <button class="btn" type="submit" id="login-btn" style="width:100%;justify-content:center"><span>Anmelden</span></button>
        <div class="msg err" id="login-error" role="alert"></div>
      </div>
    </form>
  </div>

  <div class="admin-shell" id="dash-view" hidden>
    <div class="admin-top">
      <h1>Analytics <span class="live-dot">Live</span></h1>
      <div style="display:flex;align-items:center;gap:1.25rem">
        <span class="refresh-info" id="refresh-info">Lade … <a href="#" id="manual-refresh">Jetzt aktualisieren</a></span>
        <button class="logout-btn" type="button" id="logout-btn">Abmelden</button>
      </div>
    </div>

    <p class="state" id="loading-state">Daten werden geladen …</p>

    <div id="content" hidden>
      <div class="stat-grid">
        <div class="stat-card"><p class="label">Heute</p><p class="value" id="stat-today">—</p></div>
        <div class="stat-card"><p class="label">7 Tage</p><p class="value" id="stat-week">—</p></div>
        <div class="stat-card"><p class="label">30 Tage</p><p class="value" id="stat-month">—</p></div>
        <div class="stat-card gold"><p class="label">Gesamt</p><p class="value" id="stat-total">—</p></div>
      </div>

      <section class="panel">
        <h2>Kontaktformulare</h2>
        <div class="stat-grid" style="margin-bottom:0.5rem">
          <div class="stat-card"><p class="label">Heute</p><p class="value" id="stat-forms-today">—</p></div>
          <div class="stat-card"><p class="label">Gesamt</p><p class="value" id="stat-forms-total">—</p></div>
        </div>
        <p id="form-conversion" style="display:none;align-items:center;gap:0.6rem;font-size:var(--text-sm);color:rgba(255,255,255,0.6)">
          Conversion: <strong id="form-rate" style="color:var(--bronze-light)"></strong> · <span id="form-ratio"></span>
        </p>
      </section>

      <section class="panel">
        <h2>Top-Seiten (letzte 30 Tage)</h2>
        <div id="top-pages"></div>
      </section>

      <section class="panel">
        <h2>Letzte Besuche</h2>
        <table class="visits">
          <thead><tr><th>Seite</th><th>Quelle</th><th>Zeit</th></tr></thead>
          <tbody id="recent-body"></tbody>
        </table>
      </section>
    </div>
  </div>

  <script>
    (function () {
      'use strict';
      var BACKEND = 'https://praxis-staerke-backend-production.up.railway.app';
      var adminKey = null;
      var timer = null;

      var PAGE_LABELS = {
        '/': 'Startseite', '/index.html': 'Startseite',
        '/leistungen.html': 'Leistungen', '/team.html': 'Team',
        '/aktuelles.html': 'Aktuelles', '/kontakt.html': 'Kontakt',
        '/impressum.html': 'Impressum', '/datenschutz.html': 'Datenschutz'
      };
      function pageLabel(p) { return PAGE_LABELS[p] || p; }
      function formatRef(ref) {
        if (!ref) return 'Direkt';
        try { return new URL(ref).hostname; } catch (e) { return String(ref).slice(0, 40); }
      }
      function formatTime(iso) {
        try {
          var d = new Date(iso);
          return d.toLocaleDateString('de-DE') + ' ' + d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        } catch (e) { return ''; }
      }

      function logout() {
        sessionStorage.removeItem('ak');
        if (timer) clearInterval(timer);
        location.reload();
      }

      async function loadStats() {
        try {
          var res = await fetch(BACKEND + '/api/stats', { headers: { 'X-Admin-Key': adminKey } });
          if (res.status === 401) { logout(); return; }
          var d = await res.json();

          document.getElementById('stat-today').textContent = d.today;
          document.getElementById('stat-week').textContent = d.week;
          document.getElementById('stat-month').textContent = d.month;
          document.getElementById('stat-total').textContent = d.total;
          document.getElementById('stat-forms-today').textContent = (d.formsToday != null) ? d.formsToday : '—';
          document.getElementById('stat-forms-total').textContent = (d.formsTotal != null) ? d.formsTotal : '—';
          if (d.total > 0 && d.formsTotal >= 0) {
            var rate = (d.formsTotal / d.total * 100).toFixed(1);
            var ratio = d.formsTotal > 0 ? Math.round(d.total / d.formsTotal) : '∞';
            document.getElementById('form-rate').textContent = rate + '%';
            document.getElementById('form-ratio').textContent = '1 Anfrage pro ' + ratio + ' Besuche';
            document.getElementById('form-conversion').style.display = 'flex';
          }

          var top = document.getElementById('top-pages');
          top.innerHTML = '';
          if (!d.topPages.length) {
            top.innerHTML = '<p class="state">Noch keine Daten.</p>';
          } else {
            var max = d.topPages[0].count || 1;
            d.topPages.forEach(function (r) {
              var row = document.createElement('div');
              row.className = 'bar-row';
              var page = document.createElement('span');
              page.className = 'bar-page';
              page.textContent = pageLabel(r.page);
              var track = document.createElement('div');
              track.className = 'bar-track';
              var fill = document.createElement('div');
              fill.className = 'bar-fill';
              fill.style.width = Math.round(r.count / max * 100) + '%';
              track.appendChild(fill);
              var count = document.createElement('span');
              count.className = 'bar-count';
              count.textContent = r.count;
              row.appendChild(page); row.appendChild(track); row.appendChild(count);
              top.appendChild(row);
            });
          }

          var body = document.getElementById('recent-body');
          body.innerHTML = '';
          if (!d.recent.length) {
            body.innerHTML = '<tr><td colspan="3">Noch keine Daten.</td></tr>';
          } else {
            d.recent.forEach(function (r) {
              var tr = document.createElement('tr');
              [pageLabel(r.page), formatRef(r.referrer), formatTime(r.created_at)].forEach(function (txt) {
                var td = document.createElement('td');
                td.textContent = txt;
                tr.appendChild(td);
              });
              body.appendChild(tr);
            });
          }

          document.getElementById('refresh-info').firstChild.textContent =
            'Aktualisiert: ' + new Date().toLocaleTimeString('de-DE') + ' · alle 30 Sek. ';
          document.getElementById('loading-state').hidden = true;
          document.getElementById('content').hidden = false;
        } catch (e) {
          document.getElementById('loading-state').textContent = 'Verbindungsfehler. Seite neu laden.';
        }
      }

      function showDash() {
        document.getElementById('login-view').style.display = 'none';
        document.getElementById('dash-view').hidden = false;
        loadStats();
        timer = setInterval(loadStats, 30000);
      }

      document.getElementById('login-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        var key = document.getElementById('admin-key').value.trim();
        if (!key) return;
        var btn = document.getElementById('login-btn');
        var err = document.getElementById('login-error');
        btn.disabled = true;
        err.classList.remove('is-visible');
        try {
          var res = await fetch(BACKEND + '/api/auth', { method: 'POST', headers: { 'X-Admin-Key': key } });
          if (res.ok) {
            sessionStorage.setItem('ak', key);
            adminKey = key;
            showDash();
          } else if (res.status === 429) {
            throw new Error('Zu viele Versuche. Bitte 15 Minuten warten.');
          } else {
            throw new Error('Falscher Schlüssel. Bitte erneut versuchen.');
          }
        } catch (e2) {
          err.textContent = e2.message || 'Verbindungsfehler.';
          err.classList.add('is-visible');
        } finally {
          btn.disabled = false;
        }
      });

      document.getElementById('logout-btn').addEventListener('click', logout);
      document.getElementById('manual-refresh').addEventListener('click', function (e) {
        e.preventDefault();
        loadStats();
      });

      var saved = sessionStorage.getItem('ak');
      if (saved) {
        adminKey = saved;
        showDash();
      }
    })();
  </script>
</body>
</html>
