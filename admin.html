<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — Hausarztpraxis Stärke &amp; Staack</title>
  <link rel="icon" type="image/png" href="images/logo-icon-gruen.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { background: var(--ink); color: rgba(255,255,255,0.85); min-height: 100vh; }
    body::before { display: none; }
    .admin-shell { max-width: 56rem; margin: 0 auto; padding: 2rem var(--gutter) 5rem; }
    .admin-top {
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      padding: 1.25rem 0 1.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.14);
      margin-bottom: 2.5rem;
    }
    .admin-top h1 { font-size: 1.5rem; color: #fff; display: flex; align-items: center; gap: 0.75rem; }
    .admin-badge {
      font-family: var(--sans); font-size: 0.65rem; font-weight: 600;
      letter-spacing: 0.16em; text-transform: uppercase;
      background: var(--bronze); color: #fff;
      padding: 0.3rem 0.7rem; border-radius: 99px;
    }
    .panel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .panel h2 { color: #fff; font-size: 1.4rem; margin-bottom: 1.5rem; }
    .panel .field label { color: rgba(255,255,255,0.7); }
    .panel .field input, .panel .field select, .panel .field textarea {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.2);
      color: #fff;
    }
    .panel .field input:focus, .panel .field select:focus, .panel .field textarea:focus {
      border-color: var(--bronze);
      box-shadow: 0 0 0 3px rgba(184,132,58,0.25);
    }
    .panel .field select option { color: var(--text); background: #fff; }
    .msg { display: none; margin-top: 1rem; padding: 0.85rem 1.1rem; border-radius: var(--radius); font-size: var(--text-sm); }
    .msg.ok { background: rgba(26,77,46,0.45); border-left: 2px solid #4caf7d; }
    .msg.err { background: rgba(168,53,43,0.3); border-left: 2px solid #e07a6f; }
    .msg.is-visible { display: block; }
    .login-wrap { max-width: 24rem; margin: 14vh auto 0; text-align: center; }
    .login-wrap img { width: 3.5rem; margin: 0 auto 1.5rem; }
    .admin-post {
      display: flex; gap: 1.25rem; align-items: flex-start; justify-content: space-between;
      padding: 1.25rem 0; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .admin-post:last-child { border-bottom: none; }
    .admin-post h3 { color: #fff; font-family: var(--sans); font-weight: 600; font-size: 1rem; margin: 0.5rem 0 0.3rem; }
    .admin-post p { font-size: var(--text-sm); color: rgba(255,255,255,0.6); max-width: 36em; }
    .admin-post .date { font-size: var(--text-xs); color: rgba(255,255,255,0.4); margin-top: 0.4rem; }
    .btn-del {
      flex-shrink: 0;
      background: none; border: 1px solid rgba(224,122,111,0.5); color: #e07a6f;
      font-size: var(--text-xs); font-weight: 600; letter-spacing: 0.06em;
      padding: 0.5rem 0.9rem; border-radius: var(--radius);
      transition: background var(--dur-fast);
    }
    .btn-del:hover { background: rgba(168,53,43,0.25); }
    .tag.type-urlaub { background: rgba(224,122,111,0.18); color: #e07a6f; }
    .tag.type-info { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.8); }
    .tag.type-neuigkeit { background: rgba(184,132,58,0.2); color: var(--bronze); }
    .logout-btn { background: none; border: 1px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.7); padding: 0.5rem 1rem; border-radius: var(--radius); font-size: var(--text-sm); }
    .logout-btn:hover { border-color: var(--bronze); color: #fff; }
    .state { color: rgba(255,255,255,0.5); font-size: var(--text-sm); padding: 1rem 0; }
  </style>
</head>
<body>
  <!-- Login -->
  <div class="login-wrap" id="login-view">
    <img src="images/logo-icon-transparent.png" alt="" style="filter:brightness(0) invert(1)">
    <h1 style="color:#fff;font-size:1.75rem;margin-bottom:0.5rem">Admin-Bereich</h1>
    <p style="color:rgba(255,255,255,0.6);font-size:var(--text-sm);margin-bottom:2rem">Bitte melden Sie sich mit Ihrem Admin-Schlüssel an.</p>
    <form id="login-form">
      <div class="panel" style="text-align:left">
        <div class="field">
          <label for="admin-key">Admin-Schlüssel</label>
          <input type="password" id="admin-key" autocomplete="current-password" required>
        </div>
        <button class="btn" type="submit" id="login-btn" style="width:100%;justify-content:center"><span>Anmelden</span></button>
        <div class="msg err" id="login-error" role="alert"></div>
      </div>
    </form>
  </div>

  <!-- Panel -->
  <div class="admin-shell" id="admin-view" hidden>
    <div class="admin-top">
      <h1>Stärke &amp; Staack <span class="admin-badge">Admin</span></h1>
      <button class="logout-btn" type="button" id="logout-btn">Abmelden</button>
    </div>

    <section class="panel">
      <h2>Neuen Beitrag erstellen</h2>
      <form id="create-form">
        <div class="field">
          <label for="post-type">Typ</label>
          <select id="post-type">
            <option value="info">Info</option>
            <option value="urlaub">Urlaub / Schließung</option>
            <option value="neuigkeit">Neuigkeit</option>
          </select>
        </div>
        <div class="field">
          <label for="post-title">Titel</label>
          <input type="text" id="post-title" maxlength="200" required>
        </div>
        <div class="field">
          <label for="post-content">Text</label>
          <textarea id="post-content" maxlength="5000" required></textarea>
        </div>
        <button class="btn" type="submit" id="create-btn"><span>Veröffentlichen</span></button>
        <div class="msg ok" id="create-success" role="status">Beitrag wurde veröffentlicht.</div>
        <div class="msg err" id="create-error" role="alert"></div>
      </form>
    </section>

    <section class="panel">
      <h2>Alle Beiträge</h2>
      <p class="state" id="posts-loading">Beiträge werden geladen …</p>
      <p class="state" id="posts-empty" hidden>Noch keine Beiträge vorhanden.</p>
      <div id="posts-list"></div>
    </section>
  </div>

  <script>
    (function () {
      'use strict';
      var BACKEND = 'https://praxis-staerke-backend-production.up.railway.app';
      var TYPE_LABELS = { urlaub: 'Urlaub / Schließung', info: 'Info', neuigkeit: 'Neuigkeit' };
      var adminKey = null;

      var loginView = document.getElementById('login-view');
      var adminView = document.getElementById('admin-view');
      var loginError = document.getElementById('login-error');

      function showAdmin() {
        loginView.hidden = true;
        loginView.style.display = 'none';
        adminView.hidden = false;
        loadPosts();
      }

      function logout() {
        sessionStorage.removeItem('ak');
        adminKey = null;
        location.reload();
      }

      document.getElementById('login-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        var val = document.getElementById('admin-key').value.trim();
        if (!val) return;
        var btn = document.getElementById('login-btn');
        btn.disabled = true;
        loginError.classList.remove('is-visible');
        try {
          var res = await fetch(BACKEND + '/api/auth', { method: 'POST', headers: { 'X-Admin-Key': val } });
          if (res.ok) {
            sessionStorage.setItem('ak', val);
            adminKey = val;
            showAdmin();
          } else if (res.status === 429) {
            throw new Error('Zu viele Versuche. Bitte 15 Minuten warten.');
          } else {
            throw new Error('Falscher Schlüssel. Bitte erneut versuchen.');
          }
        } catch (err) {
          loginError.textContent = err.message || 'Verbindungsfehler.';
          loginError.classList.add('is-visible');
        } finally {
          btn.disabled = false;
        }
      });

      document.getElementById('logout-btn').addEventListener('click', logout);

      async function loadPosts() {
        var loading = document.getElementById('posts-loading');
        var empty = document.getElementById('posts-empty');
        var list = document.getElementById('posts-list');
        loading.hidden = false;
        try {
          var res = await fetch(BACKEND + '/api/posts');
          if (!res.ok) throw new Error();
          var data = await res.json();
          var posts = data.posts || [];
          loading.hidden = true;
          list.innerHTML = '';
          empty.hidden = posts.length > 0;
          posts.forEach(function (post) {
            var type = TYPE_LABELS[post.type] ? post.type : 'info';
            var row = document.createElement('div');
            row.className = 'admin-post';

            var info = document.createElement('div');
            var badge = document.createElement('span');
            badge.className = 'tag type-' + type;
            badge.textContent = TYPE_LABELS[type];
            var h = document.createElement('h3');
            h.textContent = post.title || '';
            var prev = document.createElement('p');
            prev.textContent = post.content || '';
            var date = document.createElement('p');
            date.className = 'date';
            try {
              date.textContent = new Date(post.created_at).toLocaleDateString('de-DE', { day: '2-digit', month: 'long', year: 'numeric' });
            } catch (e) {}
            info.appendChild(badge); info.appendChild(h); info.appendChild(prev); info.appendChild(date);

            var del = document.createElement('button');
            del.className = 'btn-del';
            del.type = 'button';
            del.textContent = 'Löschen';
            del.addEventListener('click', async function () {
              if (!confirm('Beitrag wirklich löschen?')) return;
              del.disabled = true;
              try {
                var r = await fetch(BACKEND + '/api/posts/' + encodeURIComponent(post.id), {
                  method: 'DELETE',
                  headers: { 'X-Admin-Key': adminKey }
                });
                if (r.status === 401) { logout(); return; }
                if (!r.ok) throw new Error();
                loadPosts();
              } catch (e) {
                del.disabled = false;
                alert('Fehler beim Löschen. Bitte erneut versuchen.');
              }
            });

            row.appendChild(info);
            row.appendChild(del);
            list.appendChild(row);
          });
        } catch (e) {
          loading.textContent = 'Fehler beim Laden der Beiträge.';
        }
      }

      document.getElementById('create-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        var type = document.getElementById('post-type').value;
        var title = document.getElementById('post-title').value.trim();
        var content = document.getElementById('post-content').value.trim();
        var ok = document.getElementById('create-success');
        var err = document.getElementById('create-error');
        ok.classList.remove('is-visible');
        err.classList.remove('is-visible');
        if (!title || !content) return;

        var btn = document.getElementById('create-btn');
        btn.disabled = true;
        btn.querySelector('span').textContent = 'Wird gespeichert …';
        try {
          var res = await fetch(BACKEND + '/api/posts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey },
            body: JSON.stringify({ type: type, title: title, content: content })
          });
          if (res.status === 401) { logout(); return; }
          if (!res.ok) {
            var data = await res.json().catch(function () { return {}; });
            throw new Error(data.error || 'Fehler beim Speichern. Bitte erneut versuchen.');
          }
          document.getElementById('post-title').value = '';
          document.getElementById('post-content').value = '';
          ok.classList.add('is-visible');
          loadPosts();
        } catch (e2) {
          err.textContent = e2.message || 'Fehler beim Speichern. Bitte erneut versuchen.';
          err.classList.add('is-visible');
        } finally {
          btn.disabled = false;
          btn.querySelector('span').textContent = 'Veröffentlichen';
        }
      });

      var saved = sessionStorage.getItem('ak');
      if (saved) {
        adminKey = saved;
        showAdmin();
      }
    })();
  </script>
</body>
</html>
